<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Find Futsal | FutsalHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Navbar CSS -->
    <link rel="stylesheet" href="../css/navbar.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../css/find-futsal.css">
</head>
<body>

<!-- REUSABLE NAVBAR -->
<div id="navbar"></div>

<!-- PAGE HEADER -->
<section class="page-header text-center">
    <div class="container">
        <h1 class="fw-bold">Find Your Futsal</h1>
        <p>Search, filter and book instantly.</p>
    </div>
</section>

<!-- FILTER SECTION -->
<section class="filter-section py-4">
    <div class="container">
        <div class="card shadow-sm p-4 border-0">

            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Location</label>
                    <input type="text"
                           id="filterLocation"
                           class="form-control"
                           placeholder="Enter location">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <input type="date"
                           id="filterDate"
                           class="form-control">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Price Range</label>
                    <select id="filterPrice"
                            class="form-select">
                        <option value="">All</option>
                        <option value="1000">Below 1000</option>
                        <option value="2000">Below 2000</option>
                        <option value="3000">Below 3000</option>
                    </select>
                </div>

                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-danger w-100"
                            id="searchBtn">
                        Search
                    </button>
                </div>

            </div>

        </div>
    </div>
</section>

<!-- FUTSAL LIST SECTION -->
<section class="futsal-list py-5">
    <div class="container">

        <!-- Backend will inject cards here -->
        <div class="row g-4"
             id="futsalContainer">

            <!-- SAMPLE CARD (REMOVE WHEN BACKEND CONNECTED) -->
            <div class="col-md-4">
                <div class="card futsal-card shadow-sm border-0">

                    <img src="../images/sample.jpg"
                         class="card-img-top"
                         alt="Futsal Image">

                    <div class="card-body">
                        <h5 class="card-title">Kathmandu Arena</h5>
                        <p class="text-muted mb-1">Location: Kathmandu</p>
                        <p class="price mb-3">Rs. 1500 / Hour</p>

                        <div class="d-flex justify-content-between">
                            <a href="details.html"
                               class="btn btn-outline-dark btn-sm">
                                View Details
                            </a>
                            <a href="booking.html"
                               class="btn btn-danger btn-sm">
                                Book Now
                            </a>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="main-footer text-center">
    <div class="container">
        © 2026 FutsalHub | Final Year Project
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Navbar Loader -->
<script src="../js/navbar.js"></script>

<!-- Page JS -->
<script src="../js/find-futsal.js"></script>

</body>
</html>
