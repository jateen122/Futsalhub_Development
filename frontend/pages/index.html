<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FutsalHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Navbar CSS -->
    <link rel="stylesheet" href="../css/navbar.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>

<!-- REUSABLE NAVBAR -->
<div id="navbar"></div>

<!-- HERO CAROUSEL -->
<div id="heroCarousel"
     class="carousel slide carousel-fade"
     data-bs-ride="carousel"
     data-bs-interval="5000">

    <!-- Indicators -->
    <div class="carousel-indicators">
        <button type="button"
                data-bs-target="#heroCarousel"
                data-bs-slide-to="0"
                class="active"></button>

        <button type="button"
                data-bs-target="#heroCarousel"
                data-bs-slide-to="1"></button>
    </div>

    <div class="carousel-inner">

        <!-- SLIDE 1 -->
        <div class="carousel-item active">
            <div class="hero-slide"
                 style="background-image: url('../images/frontimage.jpg');">

                <div class="overlay"></div>

                <div class="container hero-content">
                    <div class="text-wrapper">

                        <div class="label">
                            <span class="red-line"></span>
                            FutsalHub
                        </div>

                        <h1>Find Your Ground</h1>

                        <p>
                            Get instant information from every futsal available
                            and suit to your schedule and budget.
                        </p>

                        <a href="find-futsal.html"
                           class="btn btn-danger btn-lg mt-3">
                            View All
                        </a>

                    </div>
                </div>
            </div>
        </div>

        <!-- SLIDE 2 -->
        <div class="carousel-item">
            <div class="hero-slide"
                 style="background-image: url('../images/frontimage2.jpg');">

                <div class="overlay"></div>

                <div class="container hero-content">
                    <div class="text-wrapper">

                        <div class="label">
                            <span class="red-line"></span>
                            FutsalHub
                        </div>

                        <h1>Register Your Futsal</h1>

                        <p>
                            List your futsal ground and manage bookings
                            efficiently with real-time updates.
                        </p>

                        <a href="register.html"
                           class="btn btn-warning btn-lg mt-3">
                            Register Now
                        </a>

                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- ARROWS -->
    <button class="carousel-control-prev custom-arrow"
            type="button"
            data-bs-target="#heroCarousel"
            data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next custom-arrow"
            type="button"
            data-bs-target="#heroCarousel"
            data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>

<!-- FOOTER -->
<footer class="main-footer text-center">
    <div class="container">
        © 2026 FutsalHub | Final Year Project
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Navbar Loader -->
<script src="../js/navbar.js"></script>

</body>
</html>
